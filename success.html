<!DOCTYPE html>
<html lang="en" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Still — order confirmed" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Still — order confirmed</title>
  </head>
  <body>
    <header class="site-header">
      <div class="page-wrap site-header__inner">
        <div class="site-header__bar">
          <a href="./index.html" class="brand">Still</a>
          <nav class="site-nav" aria-label="Main">
            <a href="./index.html#products" class="nav-link">Shop</a>
            <a href="./cart.html" class="nav-link cart-link" aria-label="Cart">
              Cart
              <span class="cart-badge" id="cartBadge" hidden>0</span>
            </a>
          </nav>
        </div>
      </div>
    </header>

    <main class="success-page">
      <div class="page-wrap success-page__inner">
        <div class="success-page__icon" aria-hidden="true">
          <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h1 class="heading-display success-page__title">Order confirmed</h1>
        <p class="success-page__label">Order number</p>
        <p class="success-page__order-id" id="orderId">—</p>

        <div class="order-details" id="orderDetails"></div>

        <div class="success-page__actions">
          <a href="./index.html#products" class="btn-primary">Continue shopping</a>
          <a href="./cart.html" class="btn-secondary">Back to cart</a>
        </div>
      </div>
    </main>

    <script src="cart.js"></script>
    <script src="success-page.js" defer></script>
  </body>
</html>
