<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Still — catalog section from pet project still-store." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      try {
        const saved = localStorage.getItem('still-store-design');
        const legacy = { still: 'flow', market: 'flow', luxe: 'flow', studio: 'flow' };
        document.documentElement.dataset.design = legacy[saved] || saved || 'night';
      } catch (e) {
        document.documentElement.dataset.design = 'night';
      }
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Still — catalog</title>
  </head>
  <body>
    <div data-site-header></div>

    <main class="pt-24 sm:pt-28">
      <section class="pb-16 md:pb-24" id="products">
        <div class="page-wrap catalog-shell" id="catalogShell">
          <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-2 mb-6">
            <div>
              <h1 class="heading-display text-2xl sm:text-3xl">Products</h1>
              <p class="text-sm text-ink-muted mt-1">Fresh picks from the catalog</p>
            </div>
            <p id="catalogStatus" class="text-sm text-ink-muted">Loading...</p>
          </div>

          <div class="catalog-toolbar">
            <div class="flex flex-col gap-4">
              <div class="flex flex-col sm:flex-row gap-3">
                <input
                  id="searchInput"
                  type="search"
                  placeholder="Search products..."
                  autocomplete="off"
                  class="input-field sm:max-w-xs"
                />
                <select id="sortSelect" aria-label="Sort by" class="input-field sm:w-44">
                  <option value="default">Featured</option>
                  <option value="price-asc">Price: low to high</option>
                  <option value="price-desc">Price: high to low</option>
                  <option value="rating">Top rated</option>
                </select>
              </div>
              <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-none" id="categoryFilters"></div>
            </div>
          </div>

          <div id="productGrid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-5 pt-6"></div>
        </div>
      </section>
    </main>

    <div
      id="productModal"
      tabindex="-1"
      aria-hidden="true"
      class="hidden fixed inset-0 z-[60] items-end md:items-center justify-center bg-black/40 p-3 md:p-6"
    ></div>

    <div data-site-footer></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
