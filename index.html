<!DOCTYPE html>
<html lang="en" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Still — catalog block (HTML + CSS test assignment)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Still — catalog</title>
  </head>
  <body>
    <header class="site-header">
      <div class="page-wrap site-header__inner">
        <div class="site-header__bar">
          <a href="./index.html" class="brand">Still</a>
          <nav class="site-nav" aria-label="Main">
            <a href="./index.html#products" class="nav-link is-active">Shop</a>
            <a href="./cart.html" class="nav-link cart-link" aria-label="Cart">
              Cart
              <span class="cart-badge" id="cartBadge" hidden>0</span>
            </a>
          </nav>
        </div>
      </div>
    </header>

    <section class="catalog" id="products" aria-labelledby="catalog-title">
      <div class="page-wrap catalog-shell">
        <header class="catalog-head">
          <div class="catalog-head__copy">
            <h1 id="catalog-title" class="heading-display catalog-head__title">Products</h1>
            <p class="catalog-head__lead">Fresh picks from the catalog</p>
          </div>
          <p class="catalog-head__count" id="catalogStatus">8 items</p>
        </header>

        <div class="catalog-toolbar">
          <div class="catalog-toolbar__inner">
            <div class="catalog-toolbar__controls">
              <input
                id="searchInput"
                class="input-field catalog-toolbar__search"
                type="search"
                placeholder="Search products..."
                autocomplete="off"
                aria-label="Search products"
              />
              <select id="sortSelect" class="input-field catalog-toolbar__sort" aria-label="Sort by">
                <option value="default">Featured</option>
                <option value="price-asc">Price: low to high</option>
                <option value="price-desc">Price: high to low</option>
                <option value="rating">Top rated</option>
              </select>
            </div>
            <div
              class="catalog-toolbar__filters"
              id="categoryFilters"
              role="tablist"
              aria-label="Categories"
            ></div>
          </div>
        </div>

        <div class="product-grid" id="productGrid"></div>
      </div>
    </section>

    <div
      id="productModal"
      class="modal"
      tabindex="-1"
      aria-hidden="true"
      hidden
    >
      <div class="modal__backdrop" data-close-modal></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button type="button" class="modal__close" data-close-modal aria-label="Close">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6 6 18" />
          </svg>
        </button>
        <div class="modal-panel__grid">
          <div class="modal-panel__media">
            <img id="modalImage" alt="" decoding="async" />
          </div>
          <div class="modal-panel__body">
            <p class="modal-panel__meta" id="modalCategory"></p>
            <h2 class="heading-display modal-panel__title" id="modalTitle"></h2>
            <p class="modal-panel__price" id="modalPrice"></p>
            <p class="modal-panel__rating" id="modalRating"></p>
            <p class="modal-panel__description" id="modalDescription"></p>

            <p class="label-caps">Size</p>
            <div class="size-pills" id="sizePills" role="group" aria-label="Choose size">
              <button type="button" class="size-pill is-selected" data-size="XS">XS</button>
              <button type="button" class="size-pill" data-size="S">S</button>
              <button type="button" class="size-pill" data-size="M">M</button>
              <button type="button" class="size-pill" data-size="L">L</button>
              <button type="button" class="size-pill" data-size="XL">XL</button>
            </div>

            <div class="modal-panel__qty-row">
              <p class="label-caps">Qty</p>
              <div class="qty-stepper">
                <button type="button" class="qty-stepper__btn" id="qtyMinus" aria-label="Decrease quantity">−</button>
                <input
                  type="number"
                  id="qtyInput"
                  class="qty-stepper__input"
                  min="1"
                  max="9"
                  value="1"
                  aria-label="Quantity"
                />
                <button type="button" class="qty-stepper__btn" id="qtyPlus" aria-label="Increase quantity">+</button>
              </div>
            </div>

            <button type="button" class="btn-primary modal-panel__cta" id="addToCartBtn">Add to cart</button>
          </div>
        </div>
      </div>
    </div>

    <script src="cart.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
