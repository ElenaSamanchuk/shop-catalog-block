<!DOCTYPE html>
<html lang="en" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Still — cart" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Still — cart</title>
  </head>
  <body>
    <header class="site-header">
      <div class="page-wrap site-header__inner">
        <div class="site-header__bar">
          <a href="./index.html" class="brand">Still</a>
          <nav class="site-nav" aria-label="Main">
            <a href="./index.html#products" class="nav-link">Shop</a>
            <a href="./cart.html" class="nav-link cart-link is-active" aria-label="Cart">
              Cart
              <span class="cart-badge" id="cartBadge" hidden>0</span>
            </a>
          </nav>
        </div>
      </div>
    </header>

    <main class="cart-page">
      <div class="page-wrap">
        <header class="cart-page__head">
          <h1 class="heading-display cart-page__title">Cart</h1>
          <p class="cart-page__lead">Review items and complete checkout</p>
        </header>

        <div class="checkout-steps" aria-hidden="true">
          <span class="step-dot is-active"></span>
          <span class="step-dot"></span>
          <span class="step-dot"></span>
          <span class="checkout-steps__label">Step 1 of 3</span>
        </div>

        <div id="cartEmpty" class="cart-empty" hidden>
          <p class="heading-display cart-empty__title">Your cart is empty</p>
          <p class="cart-empty__lead">Add items from the shop</p>
          <a href="./index.html#products" class="btn-primary">Browse shop</a>
        </div>

        <div id="cartContent" class="cart-layout" hidden>
          <section class="cart-layout__items">
            <div id="cartItems"></div>
          </section>

          <aside class="cart-layout__aside">
            <div class="summary-card">
              <h2 class="summary-card__title">Summary</h2>
              <dl class="summary-card__rows">
                <div class="summary-card__row">
                  <dt>Items</dt>
                  <dd id="summaryCount">0</dd>
                </div>
                <div class="summary-card__row">
                  <dt>Shipping</dt>
                  <dd>Free</dd>
                </div>
                <div class="summary-card__row summary-card__row--total">
                  <dt>Total</dt>
                  <dd id="summaryTotal">$0.00</dd>
                </div>
              </dl>
            </div>

            <form id="checkoutForm" class="checkout-form" novalidate>
              <h2 class="checkout-form__title">Delivery</h2>
              <div class="form-field">
                <label class="form-field__label" for="nameInput">Full name</label>
                <input id="nameInput" name="name" required minlength="2" autocomplete="name" class="input-field" />
              </div>
              <div class="form-field">
                <label class="form-field__label" for="emailInput">Email</label>
                <input id="emailInput" name="email" type="email" required autocomplete="email" class="input-field" />
              </div>
              <div class="form-field">
                <label class="form-field__label" for="phoneInput">Phone</label>
                <input id="phoneInput" name="phone" type="tel" required pattern="[+0-9\s()-]{8,}" autocomplete="tel" class="input-field" />
              </div>
              <div class="form-field">
                <label class="form-field__label" for="addressInput">Address</label>
                <textarea id="addressInput" name="address" rows="3" required minlength="8" class="input-field input-field--textarea"></textarea>
              </div>
              <div class="form-field">
                <label class="form-field__label" for="paymentInput">Payment</label>
                <select id="paymentInput" name="payment" class="input-field">
                  <option value="card">Credit card</option>
                  <option value="cash">Cash on delivery</option>
                </select>
              </div>
              <p id="checkoutError" class="checkout-form__error" role="alert"></p>
              <button type="submit" class="btn-primary checkout-form__submit">Place order</button>
            </form>
          </aside>
        </div>
      </div>
    </main>

    <script src="cart.js"></script>
    <script src="cart-page.js" defer></script>
  </body>
</html>
